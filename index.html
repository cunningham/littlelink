<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

<head>

  <!-- Page Information
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta charset="utf-8">
  <title>Nick Cunningham</title>
  <meta name="description" content="Links to Nick on the internet!">
  <meta name="author" content="Nick Cunningham">

  <!-- Mobile Specific Metas
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>LittleLink</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Replace this with your own, this appears in search results and when sharing.">

    <!-- Keywords -->
    <meta name="keywords" content="your name, industry, and specialties">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://yourwebsite.com">

    <!-- Author Information -->
    <meta name="author" content="Your Name">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="LittleLink">

            <!-- Replace with your name or brand -->
            <h1>
              <div>LittleLink</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>An open source DIY Linktree alternative.</p>

        <!-- Your Image Here -->
        <img src="images/avatar.png" class="avatar" srcset="images/avatar@2x.png 2x" alt="It's Nick!">

        <!-- Title -->
        <h1>Nick Cunningham</h1>

        <!-- Short Bio -->
        <p>A human on the internet!</p>

        <!--

          ## Breaking down <a> attributes:
          
          1.) class="button button-default" | The first "button" here is telling this <a> tag that it should make this element a button and applies the default styling in `css/brands.css`.
          The second portion, button-default, is declaring the specific brand style you would like to apply. Here we're applying the "default" style and color.
          If you want to make this button to use the brand colors for Discord, just change "button-default" to "button-discord". Brands are found in `css/brands.css`. You can always edit & add your own there.

          2.) Replace the # in href="#" with the desired target URL for the button.

          3.) target="_blank" | This attribute opens links in a new tab. Remove this attribute to prevent links from opening in a new tab.

          4.) rel="noopener" | This attribute instructs the browser to navigate to the target resource without granting the new browsing context access to the document that opened it.
          This is especially useful when opening untrusted links. https://developer.mozilla.org/en-US/docs/Web/HTML/Link_types/noopener

          ## Breaking down the <img> attributes:
          
          1.) class="icon" | This class is telling the <img> tag that it should use the styling for icons found in `css/brands.css`.

          2.) src="icons/[icon_name].svg" | This defines the icon you would like to display from the icons/ folder. For example, you can change this to src="icons/discord.svg" to use the Discord icon.
          Add your own 24x24 icons to the "icons" folder to reference them. We recommend providing a SVG.

          3.) alt="Example Logo" | This alt attribute helps provides alternate text for an image, this can assist users who use screen readers. 

        -->

        <!-- Email -->
        <a class="button button-default" href="mailto:nick@cunningham.website" target="_blank" rel="noopener">
          <img class="icon" src="images/icons/email.svg" alt="Email Icon">nick@cunningham.website</a>
        <br>

        <!-- Mastodon -->
        <a class="button button-mastodon" href="https://hachyderm.io/@kicknunningham" target="_blank" rel="me noopener">
          <img class="icon" src="images/icons/mastodon.svg" alt="Mastodon Logo">Mastodon</a>
        <br>

        <!-- LinkedIn -->
        <a class="button button-linked" href="https://www.linkedin.com/in/nicunningham/" target="_blank" rel="noopener">
            <img class="icon" src="images/icons/linkedin.svg" alt="LinkedIn Logo">LinkedIn</a>
        <br>

        <!-- Instagram -->
        <a class="button button-instagram" href="https://www.instagram.com/__nickcunningham__/" target="_blank" rel="noopener">
          <img class="icon" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram</a>
        <br>

        <!-- Steam -->
        <a class="button button-steam" href="https://steamcommunity.com/id/nickscupofwords/" target="_blank" rel="noopener">
            <img class="icon" src="images/icons/steam.svg" alt="Steam Logo">Steam</a>
        <br>

        <!-- Untappd -->
        <a class="button button-untappd" href="https://untappd.com/user/oneslypig" target="_blank" rel="noopener">
            <img class="icon" src="images/icons/untappd.svg" alt="Untappd Logo">Untappd</a>
        <br>

        <!-- Goodreads -->
        <a class="button button-goodreads" href="https://www.goodreads.com/user/show/3071869-nick" target="_blank" rel="noopener">
            <img class="icon" src="images/icons/goodreads.svg" alt="Goodreads Logo">Goodreads</a>
        <br>

        <!-- Letterboxd -->
        <a class="button button-letterboxd" href="https://letterboxd.com/oneslypig/" target="_blank" rel="noopener">
            <img class="icon" src="images/icons/letterboxd.svg" alt="Letterboxd Logo">Letterboxd</a>
        <br>

        <!-- GitHub -->
        <a class="button button-github" href="https://github.com/cunningham" target="_blank" rel="noopener">
          <img class="icon" src="images/icons/github.svg" alt="GitHub Logo">GitHub</a>
        <br>

        <p>| Built with <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>|</p>

      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a> | Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
      </footer>

    </div>
  </div>

</body>

</html>
